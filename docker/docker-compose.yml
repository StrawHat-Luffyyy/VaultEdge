services:
  postgres:
    image: postgres:16-alpine
    container_name: vaultedge-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: vaultedge
      POSTGRES_USER: vaultedge
      POSTGRES_PASSWORD: vaultedge_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaultedge -d vaultedge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vaultedge-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
